<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildfire Web Interpreter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0c10;
            --container-bg: #12151c;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent: #ff5c5c;
            --accent-glow: rgba(255, 92, 92, 0.4);
            --border-color: #30363d;
            --code-bg: #010409;
            --success: #39ff14;
            --upload-btn: #238636;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1d212b, var(--bg-color));
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: -2px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .editor-wrapper {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: transparent;
            color: #d1d5db;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            line-height: 1.5;
            border: none;
            padding: 20px;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            gap: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        button.btn-fire {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 32px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        button.btn-fire:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .output-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .output-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        pre {
            background-color: var(--code-bg);
            color: var(--success);
            padding: 25px;
            min-height: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        pre::before {
            content: "CONSOLE";
            position: absolute;
            top: 0;
            right: 0;
            font-size: 10px;
            padding: 4px 8px;
            background: var(--border-color);
            color: var(--text-muted);
            border-bottom-left-radius: 8px;
        }

        footer {
            margin-top: auto;
            width: 100%;
            background: rgba(18, 21, 28, 0.8);
            backdrop-filter: blur(10px);
            padding: 50px 0;
            border-top: 1px solid var(--border-color);
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .github-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #1c2128;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: var(--text-main);
            transition: border-color 0.3s;
        }

        .github-card:hover {
            border-color: var(--accent);
        }

        .github-card svg {
            margin-bottom: 12px;
            fill: var(--text-main);
        }

        .github-card span {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .info-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.8;
        }
    </style>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>wildfire</h1>
        <div class="subtitle">interpret ?? ?? ?? ??</div>
    </header>

    <div class="editor-wrapper">
        <textarea id="code" spellcheck="false">

        <div class="controls">

                <button class="btn-upload">open (.wf)</button>
                <input type="file" id="file-upload" accept=".wf,.txt" py-change="load_file">

    <div class="output-header">OUTPUT</div>

</div>

<footer>
    <div class="footer-content">
        <a href="https://github.com/wf-lang/WildFire" target="_blank" class="github-card">

            <span>wf-lang/WildFire</span>
        </a>
        <p class="info-text">

<script type="py">
from pyscript import document, window
import asyncio

def exec(src):
    grid = {}
    out_str = ""
    lines = src.split('\n')
    start_x, start_y = -1, -1
    has_plant_command = False
    for y, line in enumerate(lines):
        line = line.strip('\r')
        if '#' in line:
            line = line[:line.index('#')]
        for x, char in enumerate(line):
            grid[(x, y)] = char
            if char == '@':
                start_x, start_y = x, y
            if char == 'P':
                has_plant_command = True
    if not grid:
        return out_str, ""
    if start_x == -1:
        return "", "Error: Starting point '@' not found.\n"
    if not has_plant_command:
        return "", "Error: Rule Violation. No 'P' command found in source. Execution denied.\n"
    memory = [0] * 30000
    pointer = 0
    dx, dy = 1, 0
    x, y = start_x, start_y
    has_planted_at_runtime = False
    while True:
        char = grid.get((x, y), ' ')
        if char == ' ':
            break
        grid[(x, y)] = ' '
        if char == 'T':
            memory[pointer] = (memory[pointer] + 1) % 256
        elif char == 't':
            memory[pointer] = (memory[pointer] - 1) % 256
        elif char == '}':
            pointer += 1
        elif char == '{':
            pointer = max(0, pointer - 1)
        elif char == '>':
            dx, dy = 1, 0
        elif char == '<':
            dx, dy = -1, 0
        elif char == '^':
            dx, dy = 0, -1
        elif char == 'v':
            dx, dy = 0, 1
        elif char == '.':
            out_str += chr(memory[pointer])
        elif char == ',':
            val = window.prompt("Input a character:")
            memory[pointer] = ord(val[0]) if val else 0
        elif char == '?':
            if memory[pointer] == 0:
                x += dx
                y += dy
        elif char == 'P':
            has_planted_at_runtime = True
            nx, ny = x + dx, y + dy
            grid[(nx, ny)] = chr(memory[pointer])
        x += dx
        y += dy
    if not has_planted_at_runtime:
        return out_str, "\nError: Rule Violation. The 'P' command was not executed during runtime. Forest died.\n"
    return out_str, ""

def run_code(event):
    code = document.getElementById("code").value
    output_element = document.getElementById("output")
    output_element.innerText = ""
    out, err = exec(code)
    if err:
        output_element.innerText = out + err
    else:
        output_element.innerText = out

async def load_file(event):
    file_list = event.target.files
    if len(file_list) > 0:
        file = file_list.item(0)
        text = await file.text()
        document.getElementById("code").value = text
</script>
</body>
</html>
